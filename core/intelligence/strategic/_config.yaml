# Strategic Layer Configuration

## MCP Server

### Understand-Anything

```json
{
  "mcpServers": {
    "understand-anything": {
      "command": "node",
      "args": [
        "/path/to/understand-anything-plugin/dist/index.js"
      ],
      "env": {
        "NODE_ENV": "production"
      }
    }
  }
}
```

## 配置说明

| 配置项 | 说明 |
|--------|------|
| `command` | 启动命令 |
| `args` | 启动参数 |
| `env` | 环境变量 |

## 使用前提

1. 安装 Understand-Anything monorepo
2. 构建 `understand-anything-plugin` 包
3. 配置 MCP 服务器路径
