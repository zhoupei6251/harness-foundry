# Harness 编排默认配置（平台无关）
# 所有领域共用的基础设置，适配器可在本地 settings 覆盖

global:
  # 最大并行数（硬顶 5）
  max_parallel: 5

  # 阶段门禁
  stage_gates:
    - name: planning
      require_confirmation: true
    - name: implementation
      require_confirmation: true
    - name: review
      max_retries: 2

  # Skill 加载优先级
  skill_priority:
    - domain_skills
    - shared_skills
    - user_skills
    - truth_source_skills

  # Token 节流
  token_throttle:
    session_start_read:
      - memory.md
      - intent-routing.md
    skip_on_start:
      - orchestration/
      - adapters/

  # P1-3: 持续学习配置
  continuous_learning:
    enabled: true
    instinct:
      storage:
        project_path: references/instincts/project
        global_path: references/instincts/global/instincts
      quality:
        min_confidence: 0.0
        max_confidence: 1.0
      decay:
        grace_days: 30               # 宽限期（天）
        decay_per_30_days: 0.05      # 每 30 天衰减量
      evolve:
        min_count: 5                 # 最少 instinct 数
        min_avg_confidence: 0.7      # 最低平均置信度
        cluster_similarity: 0.7      # 聚类相似度阈值
      prune:
        threshold: 0.3               # 低于此值自动删除
        auto_interval_days: 7        # 自动清理间隔（天）
        evolved_retention_days: 60   # 已进化 instinct 保留天数

# code 域专属
code:
  # 执行环境（P0-1: Harness/Compute 分离 — 替代旧 worktree 配置）
  execution:
    default_provider: worktree
    fallback_provider: local
    isolation_level: full
    auto_cleanup: true
    max_lifetime_minutes: 60
    disk_space_min_mb: 100
    health_check_interval_seconds: 300

  runtime:
    loop_mode: single-pass   # single-pass | maintenance | continuous（opt-in）
  artifacts:
    runtime_dir: .ai-runtime-artifacts
    plans_dir: .ai-runtime-artifacts/plans
    execution_logs: .ai-runtime-artifacts/execution-logs
    tracking_dir: .ai-runtime-artifacts/execution-logs/tracking
    handoff: .ai-runtime-artifacts/execution-logs/HANDOFF.md

  # [已废弃] worktree 配置 — 由 execution.provider=worktree 替代，保留向后兼容
  worktree:
    enabled: true
    base_branch: main
    path_prefix: .harness-worktrees
    deprecated: true
    migration: "使用 execution.default_provider: worktree 替代"

# novel 域专属
novel:
  # 执行环境（P0-1: Harness/Compute 分离）
  execution:
    default_provider: local
    fallback_provider: local
    isolation_level: none
    auto_cleanup: false
  # 并行上限
  parallel:
    max_workers: 5
    max_writer_batch: 5

  # 审稿
  review:
    max_revisions: 2        # 单章最多返修次数
    pass_threshold: 70      # 6维评分及格线（百分制）
    required_dimensions:    # 必须评分的维度
      - plot                # 情节
      - character           # 人物
      - prose               # 文笔
      - worldbuilding       # 世界观
      - emotion             # 情感
      - innovation          # 创新

  # 写作
  writing:
    min_word_count: 2000    # 单章最低字数
    target_word_count: 3000 # 单章目标字数
    max_word_count: 5000    # 单章最高字数

  # 记忆
  memory:
    global_path: ~/.claude/GLOBAL-MEMORY.md
    project_file: MEMORY.md
    resume_context_max_tokens: 500

  # 运行时产物
  artifacts:
    runtime_dir: .harness-novel-runtime
    plans_dir: .harness-novel-runtime/plans
    execution_logs: .harness-novel-runtime/execution-logs
    tracking_dir: .harness-novel-runtime/execution-logs/tracking
    memory_dir: .harness-novel-runtime/memory

# news 域专属
news:
  # 执行环境（P0-1: Harness/Compute 分离）
  execution:
    default_provider: local
    fallback_provider: local
    isolation_level: none
    auto_cleanup: false
  # 审稿
  review:
    max_revisions: 2
    fact_check_required: true

  # 写作
  writing:
    target_word_count: 800  # 单篇目标字数
    max_word_count: 1500

  # 运行时产物
  artifacts:
    runtime_dir: .harness-news-runtime
    plans_dir: .harness-news-runtime/plans
    execution_logs: .harness-news-runtime/execution-logs
    tracking_dir: .harness-news-runtime/execution-logs/tracking
