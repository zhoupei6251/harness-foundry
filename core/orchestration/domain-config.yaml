# 领域编排配置
# 架构：用户 → Domain Leader → Worker
#
# - 用户：唯一的决策者。Leader 在阶段门禁处暂停等用户确认
# - Domain Leader：当前会话 AI。路由判定 → 拆 WU → 派兵 → 整合 → 汇报
# - Worker：子 Agent。执行具体任务（写代码/写章节/写稿件）
#
# 无需 handoff 文件传递，Leader 直接对用户负责。

# === 全局 Leader ===
# Leader 由当前会话 AI 担任，不通过 handoff 派发
leader:
  role: session-coordinator
  agents:
    - ceo
  skills:
    - ceo-orchestration

# === 域层 ===
domains:
  code:
    # 执行环境（P0-1: Harness/Compute 分离）
    execution:
      default_provider: worktree
      fallback_provider: local
      isolation_level: full
      auto_cleanup: true

    # CEO → Domain Leader 派发
    leader: leader-code
    workers:
      - coder
      - debugger
      - code-reviewer
      - reviewer
      - test-engineer

    # 主 Agent（必须加载）
    primary_agents:
      - leader-code
      - coder
      - debugger
      - code-reviewer
      - reviewer
      - test-engineer

    # 次 Agent（按需加载）
    secondary_agents:
      - architect              # 涉及架构设计时加载
      - implementer            # 轻量实现（文档/配置）
      - planner                # 代码域规划（plan 拆分）
      - code-simplifier        # 精简/优化代码时
      - tech-writer            # 写技术文档时
      - explorer               # 只读探查代码库时
      - web-investigator       # 需要调研时加载
      - shared-researcher      # 通用调研时加载

    # 主 Skill（必须加载）
    primary_skills:
      - brainstorming
      - architecture-patterns
      - test-driven-development
      - code-review
      - refactor-safely

    # Intelligence Layer Skills（代码理解）
    intelligence_skills:
      # 战略层 - Understand-Anything
      strategic:
        - understand-project      # 项目理解
        - analyze-architecture   # 架构分析
        - query-knowledge-graph   # 图谱查询

      # 战术层 - CodeGraph
      tactical:
        - index-project          # 索引建立
        - query-symbol           # 符号定位
        - get-callers           # 调用方分析
        - get-callees           # 被调用方分析
        - analyze-impact         # 影响评估

    # 次 Skill（按需加载）
    secondary_skills:
      - simplify               # /simplify 精简代码
      - technical-writer       # 写技术文档
      - humanizer-zh           # 文档去 AI 味
      - web-tools-guide        # 查资料
      - playwright             # E2E 测试 / 浏览器自动化（test-engineer E2E 主工具）

  novel:
    # 执行环境（P0-1: Harness/Compute 分离）
    execution:
      default_provider: local
      fallback_provider: local
      isolation_level: none
      auto_cleanup: false

    # CEO → Domain Leader 派发
    leader: leader-novel
    workers:
      - novel-writer
      - novel-planner
      - novel-reviewer
      - humanizer

    primary_agents:
      - leader-novel
      - novel-writer
      - novel-planner
      - novel-reviewer
      - humanizer

    secondary_agents:
      - shared-researcher        # 查资料时
      - editor                   # 统稿时
      - memory-keeper            # 记忆同步时

    # 命令入口
    commands:
      - /novel                  # 小说创作命令入口
      - /write                  # 写章节
      - /outline                # 写大纲
      - /evaluate               # 审稿评分
      - /polish                 # 润色

    # 编排与路由
    primary_skills:
      # 核心路由
      - novel-orchestrator       # 完整编排（复杂任务）
      - novel-quick-write        # 快速写作（单章）
      - novel-batch-write        # 批量写作

      # 质量保障
      - novel-evaluator          # 7维审稿评分
      - novel-receiving-review    # 接收审稿反馈
      - novel-mechanical-scorer  # 机械评分器（无LLM）
      - novel-voice-profile      # 人物声音档案
      - novel-contexts            # 上下文一致性
      - humanizer-zh             # 轻量润色

      # 进度与状态
      - novel-dashboard          # 进度仪表板
      - novel-checkpoint         # 检查点管理
      - novel-metrics            # 写作统计

      # 初始化
      - novel-init               # 新书创建向导
      - novel-recovery           # 会话恢复

    secondary_skills:
      - novel-ai-wash           # 深度文风清洗
      - web-tools-guide          # 查资料
      - summarize               # 总结内容
      - memory-manager          # 记忆同步
      - inkos                   # InkOS 创作系统
      - fanqie-novel-auto-publish # 番茄发布

  news:
    # 执行环境（P0-1: Harness/Compute 分离）
    execution:
      default_provider: local
      fallback_provider: local
      isolation_level: none
      auto_cleanup: false

    # CEO → Domain Leader 派发
    leader: leader-news
    workers:
      - news-writer
      - fact-checker
      - news-editor

    primary_agents:
      - leader-news
      - news-writer
      - fact-checker

    secondary_agents:
      - news-editor            # 审校时
      - shared-researcher      # 调研时

    primary_skills:
      - news-generator
      - fact-check
      - news-polish

    secondary_skills:
      - hot-topic-research     # 追热点
      - web-tools-guide        # 查资料
      - summarize              # 生成简报
      - humanizer-zh           # 稿件去 AI 味

# === 运行时目录 ===
# handoff 机制已移除。Leader 直接对用户负责。
# 各域运行时产物路径见各域 artifacts 配置。
runtime:
  state_file: state.json
