# Execution Context Model
#
# Agent = Harness（控制流） + Compute（执行环境） + Model
#
# 参考：OpenAI Agents SDK 2026 — Harness/Compute 分离架构
# 作用：统一抽象所有 Agent 的执行环境，消除各平台/各域手动管理沙箱的碎片化问题

version: 2

execution_context:
  schema:
    id:
      type: string
      format: "{provider}-{domain}-{timestamp}-{nonce}"
      example: "worktree-code-20260626-a1b2c3"
    provider:
      type: enum
      values: [worktree, local, docker]
      description: |
        - worktree: git worktree 隔离（code 域编译/测试）
        - local: 当前工作目录（novel/news 单章写作、reviewer 只读审查）
        - docker: 容器隔离（预留，适用于不可信代码执行）
    state:
      type: enum
      values: [pending, provisioning, active, deactivating, closed, error]
      transitions:
        pending: [provisioning, error]
        provisioning: [active, error]
        active: [deactivating, error]
        deactivating: [closed, error]
    isolation_level:
      type: enum
      values: [full, partial, none]
      description: |
        - full: 独立沙箱/worktree，不可写主工作区（code 域编译/测试）
        - partial: 可读不可写（reviewer 角色、explorer 探查）
        - none: 主线程直接操作（novel/news 单章写作、小改动）
    spec:
      type: object
      properties:
        cwd:
          type: string
          description: 执行上下文的工作目录
        env:
          type: map
          description: 环境变量注入
        network:
          type: boolean
          default: true
          description: 是否允许网络访问
        host_fs_read:
          type: boolean
          default: true
          description: 是否允许读取主机文件系统
        host_fs_write:
          type: boolean
          default: false
          description: 是否允许写主机文件系统（full 隔离下为 false）
        git_support:
          type: boolean
          default: true
          description: 是否支持 git 操作
        max_lifetime_seconds:
          type: integer
          default: 3600
          description: 最大生命周期，超时自动销毁
    bindings:
      type: object
      properties:
        cwd:
          type: string
        env:
          type: map
        filesystem:
          type: enum
          values: [shared, copy-on-write, isolated]
          description: |
            - shared: 与主工作区共享文件系统
            - copy-on-write: 写时复制（worktree 语义）
            - isolated: 完全隔离（docker 语义）
    lifecycle:
      type: object
      properties:
        created_at:
          type: timestamp
        activated_at:
          type: timestamp
        expires_at:
          type: timestamp
          nullable: true
        destroyed_at:
          type: timestamp
          nullable: true
    capabilities:
      type: object
      properties:
        git_commit:
          type: boolean
          default: false
          description: 是否允许提交代码
        network_access:
          type: boolean
          default: true
        host_fs_read:
          type: boolean
          default: true
        subagent_spawn:
          type: boolean
          default: false
          description: 是否允许在 ctx 内再派子 Agent

  # 域 → 默认 provider 映射
  domain_defaults:
    code:
      provider: worktree
      isolation_level: full
      filesystem: copy-on-write
    novel:
      provider: local
      isolation_level: none
      filesystem: shared
    news:
      provider: local
      isolation_level: none
      filesystem: shared

  # 角色 → 推荐隔离级别
  role_isolation:
    coder:
      isolation_level: full
      reason: "编译/测试需要隔离环境，避免污染主工作区"
    implementer:
      isolation_level: partial
      reason: "文档/配置类任务仅需只读访问源码"
    reviewer:
      isolation_level: partial
      reason: "审查只需读取，不应修改代码"
    test-engineer:
      isolation_level: full
      reason: "测试执行需要隔离环境"
    debugger:
      isolation_level: partial
      reason: "调试需要读取源码和运行环境"
    explorer:
      isolation_level: partial
      reason: "只读探查"
    web-investigator:
      isolation_level: partial
      reason: "网络调研无需写本地文件"
    novel-writer:
      isolation_level: none
      reason: "写作直接产出章节文件"
    novel-reviewer:
      isolation_level: none
      reason: "审稿直接读取章节文件"
    humanizer:
      isolation_level: none
      reason: "润色直接修改文本文件"
    news-writer:
      isolation_level: none
      reason: "写稿直接产出稿件文件"
    fact-checker:
      isolation_level: none
      reason: "核查直接读取稿件文件"
    news-editor:
      isolation_level: none
      reason: "审校直接修改稿件文件"
