platform: trae
matrix_version: 2
capabilities:
  routing.stage-gate:
    status: supported
    binding: "ENTRY.md + harness-foundry/core/intent-routing.md 阶段门禁"
  routing.harness-declare:
    status: supported
    binding: "首句 Harness 声明（强制）"
  orchestration.dispatch:
    status: supported
    binding: "harness-orchestration skill → harness-foundry/core/orchestration/dispatcher-workflow.md"
  orchestration.leader:
    status: supported
    binding: "主 Agent 调度 + Task 派发"
  orchestration.parallel-wu:
    status: supported
    binding: "并行 Task(general_purpose_task); max 5"
  orchestration.dispatch-track:
    status: supported
    binding: "DISPATCH-TRACK append-only"
  orchestration.worktree-sandbox:
    status: not-supported
    binding: "Trae 无原生 worktree 沙箱；主 checkout 直接改"
    fallback: "git branch 隔离"
    notes: "P0-1: execution-context worktree provider 不可用，降级为 local"
  orchestration.provision-context:
    status: degraded
    binding: "P0-1: local provider 始终可用，worktree provider 不支持"
  orchestration.destroy-context:
    status: degraded
    binding: "P0-1: local provider no-op destroy"
  orchestration.collective-closeout:
    status: supported
    binding: "collective-test + harness-reviewer + code-review"
  orchestration.continuous-loop:
    status: supported
    binding: "harness-foundry/core/orchestration/continuous-loop.md opt-in"
  roles.coder:
    status: supported
    binding: "Task(general_purpose_task) + harness-foundry/agents/coder.md"
  roles.implementer:
    status: supported
    binding: "Task(general_purpose_task) + harness-foundry/agents/implementer.md"
  roles.reviewer:
    status: supported
    binding: "Task(general_purpose_task) + harness-foundry/agents/reviewer.md（readonly）"
  roles.test-engineer:
    status: supported
    binding: "Task(general_purpose_task) + harness-foundry/agents/test-engineer.md + TDD skill"
  roles.explorer:
    status: supported
    binding: "Task(search) 或 Task(general_purpose_task) + harness-foundry/agents/explorer.md"
  roles.debugger:
    status: supported
    binding: "Task(general_purpose_task) + harness-foundry/agents/debugger.md"
  roles.web-investigator:
    status: supported
    binding: "Task(search) + harness-foundry/agents/web-investigator.md"
  artifacts.runtime-layout:
    status: supported
    binding: ".ai-runtime-artifacts/"
  artifacts.verification-lite:
    status: supported
    binding: "Tier 1 Leader 直做 → harness-foundry/artifact-templates/verification-lite.md"
  skills.stage-load:
    status: supported
    binding: "Skill 工具加载 SKILL.md；投影目录 .trae/skills/"
  interaction.structured-ask:
    status: supported
    binding: "AskUserQuestion"
  hooks.session-lifecycle:
    status: not-supported
    binding: "Trae 无 hooks.json 机制"
    fallback: "会话开始首句 Harness 声明 + Skill 工具按需加载"

cross_cutting:
  parallel_agents:
    max: 5
    mechanism: "Task"
  worktree_sandbox:
    supported: false
  guardrail_support:
    input: false
    output: false
    notes: "Trae 无 hook 机制，guardrail 依赖 prompt 内规则"
