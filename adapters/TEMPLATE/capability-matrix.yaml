# 适配器 Capability Matrix 标准化模板（v2）
#
# 使用方式：
# 1. 复制本文件到 adapters/<platform>/capability-matrix.yaml
# 2. 填写 platform 名称
# 3. 对每个 capability，设置 status + binding + notes
# 4. 删除未使用的 capability_id
#
# 参考：core/capabilities/registry.md — 所有 capability 的注册表

platform: "<PLATFORM_NAME>"
matrix_version: 2
description: "<平台> 的 capability parity 矩阵"

# 能力 ID 列表，从 core/capabilities/registry.md 同步
capabilities:
  routing.stage-gate:
    status: supported       # supported | degraded | manual | unsupported
    binding: "<平台 API 引用>"
    notes: null

  routing.harness-declare:
    status: supported
    binding: ""
    notes: null

  orchestration.dispatch:
    status: supported
    binding: ""
    notes: null

  orchestration.leader:
    status: supported
    binding: ""
    notes: null

  orchestration.parallel-wu:
    status: supported
    binding: ""
    notes: null

  orchestration.dispatch-track:
    status: supported
    binding: ""
    notes: null

  orchestration.worktree-sandbox:
    status: supported
    binding: ""
    notes: "P0-1: execution-context worktree provider"

  orchestration.provision-context:
    status: supported
    binding: "P0-1: execution-context Provider 协议"
    notes: null

  orchestration.destroy-context:
    status: supported
    binding: "P0-1: 环境销毁"
    notes: null

  orchestration.collective-closeout:
    status: supported
    binding: ""
    notes: null

  orchestration.continuous-loop:
    status: manual
    binding: ""
    notes: null

  roles.coder:
    status: supported
    binding: ""
    notes: null

  roles.implementer:
    status: supported
    binding: ""
    notes: null

  roles.reviewer:
    status: supported
    binding: ""
    notes: null

  roles.test-engineer:
    status: supported
    binding: ""
    notes: null

  roles.explorer:
    status: supported
    binding: ""
    notes: null

  roles.debugger:
    status: supported
    binding: ""
    notes: null

  roles.web-investigator:
    status: supported
    binding: ""
    notes: null

  artifacts.runtime-layout:
    status: supported
    binding: ""
    notes: null

  artifacts.verification-lite:
    status: supported
    binding: ""
    notes: null

  skills.stage-load:
    status: supported
    binding: ""
    notes: null

  interaction.structured-ask:
    status: supported
    binding: ""
    notes: null

  hooks.session-lifecycle:
    status: supported
    binding: ""
    notes: null

# 横切关注点
cross_cutting:
  parallel_agents:
    max: 5
    mechanism: "subagent | task | tmux"
  worktree_sandbox:
    supported: true         # true | false | manual
  guardrail_support:
    input: true             # P0-2: Input Guardrail 是否可用
    output: true            # P0-2: Output Guardrail 是否可用
