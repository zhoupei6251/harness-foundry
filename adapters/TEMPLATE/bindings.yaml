# 适配器 Bindings 标准化模板
#
# 使用方式：
# 1. 复制本文件到 adapters/<platform>/bindings.yaml
# 2. 填写每个 primitive 的平台映射
# 3. 标注平台特有的限制和约定

platform: "<PLATFORM_NAME>"
bindings_version: 2

primitives:
  DetectPlatform:
    binding: "<如何检测当前运行平台>"
    example: ""

  LoadCapability:
    binding: "<如何加载 capability 定义文件>"
    example: ""

  StageGate:
    binding: "<如何实现阶段门禁：写入后暂停等用户确认>"
    example: ""

  ProvisionContext:
    binding: "<P0-1: 如何创建 execution-context>"
    provider_mapping:
      worktree: "<git worktree 命令>"
      local: "<默认 cwd>"
      docker: "<stub/不支持>"

  SpawnWorker:
    binding: "<如何派发子 Agent/Task>"
    max_parallel: 5
    example: ""

  ParallelBatch:
    binding: "<如何并行执行多个 Worker>"
    mechanism: "subagent | task | tmux"
    max_batch: 5

  DestroyContext:
    binding: "<P0-1: 如何销毁 execution-context>"
    example: ""

  Integrate:
    binding: "<Leader 如何合并结果>"
    example: ""

  CollectiveTest:
    binding: "<如何运行集体测试>"
    example: ""

  CollectiveReview:
    binding: "<如何运行集体审查>"
    example: ""

  StructuredAsk:
    binding: "<如何结构化询问用户>"
    degraded: false
    fallback: ""

  EmitHook:
    binding: "<如何触发 hook>"
    hook_config_path: ""

platform_limits:
  worktree: true | false
  hooks: true | false | manual
  parallel_limit: 5
  continuous_loop: true | false | manual
