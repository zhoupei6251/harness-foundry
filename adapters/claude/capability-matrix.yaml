platform: claude
matrix_version: 2
capabilities:
  routing.stage-gate:
    status: supported
    binding: "routing.md 阶段门禁"
  routing.harness-declare:
    status: supported
    binding: "首句 Harness 声明"
  orchestration.dispatch:
    status: supported
    binding: "claude-orchestration → core dispatcher"
  orchestration.leader:
    status: supported
    binding: "主会话 Leader"
  orchestration.parallel-wu:
    status: supported
    binding: "并行 Task; max 3"
  orchestration.dispatch-track:
    status: supported
    binding: "DISPATCH-TRACK append-only"
  orchestration.worktree-sandbox:
    status: supported
    binding: "execution-context worktree provider — git worktree 隔离"
    notes: "P0-1: 由 execution-context Provider 协议统一管理"
  orchestration.collective-closeout:
    status: supported
    binding: "collective-test + reviewer Task + code-review"
  orchestration.continuous-loop:
    status: manual
    binding: "HANDOFF 人工衔接多会话"
    notes: "见 continuous-loop 文档 opt-in"
  roles.coder:
    status: supported
    binding: "Task + agents/coder.md"
  roles.implementer:
    status: supported
    binding: "Task + agents/implementer.md"
  roles.reviewer:
    status: supported
    binding: "新 Task readonly + agents/reviewer.md"
  roles.test-engineer:
    status: supported
    binding: "Task + agents/test-engineer.md"
  roles.explorer:
    status: supported
    binding: "Task explore 或 generalPurpose readonly"
  roles.debugger:
    status: supported
    binding: "Task + agents/debugger.md"
  roles.web-investigator:
    status: supported
    binding: "Task + agents/web-investigator.md"
  artifacts.runtime-layout:
    status: supported
    binding: ".ai-runtime-artifacts/"
  artifacts.verification-lite:
    status: supported
    binding: "Tier 1 → verification-lite.md"
  skills.stage-load:
    status: supported
    binding: "Read SKILL.md"
  interaction.structured-ask:
    status: supported
    binding: "AskUserQuestion 工具"
  hooks.session-lifecycle:
    status: supported
    binding: ".claude/settings.json PostLogin hook"
  # P0-1 新增: execution-context 相关
  orchestration.provision-context:
    status: supported
    binding: "execution-context Provider 协议 — Provision/Activate/Deactivate/Destroy"
  orchestration.destroy-context:
    status: supported
    binding: "git worktree remove + 分支清理"

cross_cutting:
  parallel_agents:
    max: 5
    mechanism: "subagent"
  worktree_sandbox:
    supported: true
  guardrail_support:
    input: true
    output: true
    notes: "P0-2: Claude Code 支持 hook 层面拦截"
