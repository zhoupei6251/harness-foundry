# 能力副本：复制来源（供 sync 脚本与维护者参考）
# 更新日期：2026-05-25

skills:
  test-driven-development:
    source: ~/.agents/skills/test-driven-development/SKILL.md
    upstream: obra/superpowers
  verification-before-completion:
    source: ~/.agents/skills/verification-before-completion/SKILL.md
    upstream: obra/superpowers
  systematic-debugging:
    source: ~/.agents/skills/systematic-debugging/SKILL.md
    upstream: obra/superpowers
  requesting-code-review:
    source: ~/.agents/skills/requesting-code-review/
    upstream: obra/superpowers
    note: "sync copies SKILL.md + code-reviewer.md (copy_skill_dir)"
  receiving-code-review:
    source: ~/.agents/skills/receiving-code-review/SKILL.md
    upstream: obra/superpowers
  frontend-design:
    source: ~/.cursor/skills/frontend-design/SKILL.md
    upstream: anthropics/skills (frontend-design)
  agent-browser:
    source: ~/.agents/skills/agent-browser/SKILL.md
    upstream: inference.sh agent-browser
  ui-ux-pro-max:
    source: ~/.trae/skills/ui-ux-pro-max/
    upstream: "ui-ux-pro-max (full directory: SKILL.md + data/ + scripts/)"
    note: "sync copies entire directory, not SKILL.md only"
