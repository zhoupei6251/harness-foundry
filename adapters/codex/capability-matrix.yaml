platform: codex
matrix_version: 2
capabilities:
  routing.stage-gate:
    status: supported
    binding: "routing.md + AGENTS overlay"
  routing.harness-declare:
    status: supported
    binding: "Harness 声明"
  orchestration.dispatch:
    status: supported
    binding: "omx ultrawork"
  orchestration.leader:
    status: supported
    binding: "主 Agent + omx leader 路由"
  orchestration.parallel-wu:
    status: supported
    binding: "omx ultrawork 并行"
  orchestration.dispatch-track:
    status: supported
    binding: "execution-log / omx tracking"
  orchestration.worktree-sandbox:
    status: degraded
    binding: "git worktree 或跳过"
    degraded_reason: "omx 默认路径可能无 worktree"
    notes: "P0-1: execution-context worktree provider degraded → 降级为 local"
  orchestration.provision-context:
    status: degraded
    binding: "P0-1: worktree 需手动执行，local provider 始终可用"
  orchestration.destroy-context:
    status: degraded
    binding: "P0-1: manual git worktree remove"
  orchestration.collective-closeout:
    status: supported
    binding: "verify/fix + reviewer 路由"
  orchestration.continuous-loop:
    status: manual
    binding: "omx 维护模式 opt-in"
  roles.coder:
    status: supported
    binding: "omx worker"
  roles.implementer:
    status: supported
    binding: "omx worker"
  roles.reviewer:
    status: supported
    binding: "omx reviewer"
  roles.test-engineer:
    status: supported
    binding: "omx test 路由"
  roles.explorer:
    status: supported
    binding: "omx explore"
  roles.debugger:
    status: supported
    binding: "omx debugger"
  roles.web-investigator:
    status: degraded
    binding: "general research 路由"
    degraded_reason: "无专用 web-investigator omx 角色"
  artifacts.runtime-layout:
    status: supported
    binding: ".ai-runtime-artifacts/"
  artifacts.verification-lite:
    status: supported
    binding: "Tier 1 → verification-lite.md"
  skills.stage-load:
    status: supported
    binding: "omx skills / Read SKILL.md"
  interaction.structured-ask:
    status: degraded
    binding: "对话式"
  hooks.session-lifecycle:
    status: manual
    binding: "无标准 hook"

cross_cutting:
  parallel_agents:
    max: 5
    mechanism: "omx ultrawork"
  worktree_sandbox:
    supported: degraded
  guardrail_support:
    input: false
    output: false
    notes: "Codex guardrail 依赖 omx prompt 规则，无 hook 层面拦截"
